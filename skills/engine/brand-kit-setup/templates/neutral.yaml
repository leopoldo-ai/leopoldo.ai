# Neutral default brand-kit
# Used as fallback when no client brand-kit is provided.
# Professional, finance-leaning, modifiable anytime.
# Generated by brand-kit-setup skill (mode B).

brand:
  # IMPORTANT: brand.name is intentionally EMPTY in this Mode B fallback.
  # DO NOT auto-fill with placeholder text like "Your Company" or any invented
  # name. Bug A2-#2 (2026-05-09): Mode B should never hallucinate a fund/company
  # name when Phase 1 didn't ask for it. The user MUST edit this manually,
  # or run /leopoldo brand to set up interactively (Mode A asks the name).
  # When name is empty, document footer should fallback to "Confidential" only.
  name: ""
  tagline: ""
  language_primary: "EN"

colors:
  primary: "#1a365d"        # Institutional dark blue
  secondary: "#4a5568"      # Slate gray
  accent: "#2563eb"         # Clean blue for emphasis and links
  background: "#ffffff"     # White
  text_body: "#1a202c"      # Near-black for body
  text_muted: "#4a5568"     # Slate for secondary text
  success: "#16a34a"        # Green
  warning: "#d97706"        # Amber
  danger: "#dc2626"         # Red

typography:
  body_font: "Inter"
  heading_font: "Instrument Serif"
  monospace_font: "JetBrains Mono"
  body_size: "11pt"
  heading_size_h1: "28pt"
  heading_size_h2: "20pt"
  heading_size_h3: "14pt"
  line_height_body: 1.5
  line_height_heading: 1.2

spacing:
  margin_page: "2.5cm"
  margin_section: "1.5cm"
  paragraph_spacing: "1.15"
  section_spacing: "2.0"

document:
  logo_path: null
  logo_position: "top_left"
  footer_text: "{brand.name} | Confidential"
  page_numbers: true
  page_numbers_format: "Page X of Y"
  classification_visible: true
  classification_default: "Confidential"
  cover_page: true
  table_of_contents: true

charts:
  palette:
    - "#1a365d"
    - "#2563eb"
    - "#4a5568"
    - "#16a34a"
    - "#d97706"
    - "#dc2626"
  grid_color: "#e5e7eb"
  axis_color: "#6b7280"

# Notes for editors:
# - Replace `brand.name` with your actual company name
# - Update `colors.primary` to your brand color (hex format #RRGGBB)
# - Set `document.logo_path` to your logo file (PNG/SVG, ideally 300+ DPI)
# - Run `/leopoldo brand show` to verify current values
# - Run `/leopoldo brand reset` to start over from this neutral default
